# Come On Asshole - Nginx 反向代理配置
# 将此文件复制到 /etc/nginx/conf.d/asshole.conf

server {
  listen 80;
  listen [::]:80;
  server_name asshole.biw.ac;
  
  # 重定向到 HTTPS
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name asshole.biw.ac;

  # 日志配置
  #access_log  /var/log/nginx/asshole.biw.ac.access.log;
  #error_log   /var/log/nginx/asshole.biw.ac.error.log;

  # SSL 证书配置 (使用 Let's Encrypt)
  ssl_certificate /etc/letsencrypt/live/asshole.biw.ac/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/asshole.biw.ac/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 10M;
  server_tokens off;

  # 代理头设置
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Host $host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  # 超时设置
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # 健康检查端点
  location /health {
    access_log off;
    proxy_pass http://127.0.0.1:5173/health;
  }

  # 主应用转发到 Docker 容器
  location / {
    proxy_pass http://127.0.0.1:5173;
    proxy_http_version 1.1;
    
    # WebSocket 支持
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # 静态资源缓存
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://127.0.0.1:5173;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # 禁止访问隐藏文件
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Gzip 压缩
  gzip on;
  gzip_http_version 1.1;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1000;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;
}
