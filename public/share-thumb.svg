<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="300" fill="#FFD700"/>
  
  <!-- 边框 -->
  <rect x="10" y="10" width="280" height="280" fill="none" stroke="#000" stroke-width="8"/>
  
  <!-- 标题背景 -->
  <rect x="20" y="20" width="260" height="80" fill="#FF4444"/>
  
  <!-- 标题文字 -->
  <text x="150" y="55" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">COME ON</text>
  <text x="150" y="85" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">ASSHOLE!</text>
  
  <!-- 中间图标区域 -->
  <text x="150" y="170" font-size="80" text-anchor="middle">💩</text>
  
  <!-- 副标题 -->
  <text x="150" y="230" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000" text-anchor="middle">职场翔王排行榜</text>
  
  <!-- 底部提示 -->
  <text x="150" y="265" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">一起吐槽职场混蛋</text>
</svg>