version: '3.8'

services:
  come-on-asshole:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: come-on-asshole
    ports:
      - "5173:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
